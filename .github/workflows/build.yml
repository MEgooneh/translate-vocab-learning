name: Build & Pack Extension

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate manifest
        run: |
          node -e "
            const m = require('./manifest.json');
            if (!m.manifest_version || !m.name || !m.version) {
              console.error('Invalid manifest.json');
              process.exit(1);
            }
            console.log(m.name + ' v' + m.version);
          "

      - name: Pack extension
        run: |
          VERSION=$(node -e "console.log(require('./manifest.json').version)")
          mkdir -p dist
          zip -r "dist/translate-vocab-learning-v${VERSION}.zip" \
            manifest.json \
            background/ \
            content/ \
            fonts/ \
            icons/ \
            lib/ \
            options/ \
            popup/ \
            -x "*.DS_Store"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: extension-zip
          path: dist/*.zip
